<div
  class="chat-hint"
  *ngIf="showHint && !isOpen"
  role="button"
  tabindex="0"
  (click)="togglePanel()"
  (keydown.enter)="togglePanel()">
  <button
    type="button"
    class="chat-hint__close"
    (click)="$event.stopPropagation(); dismissHint()"
    [attr.aria-label]="'chatbot_close' | t">×</button>
  <p>{{ 'chatbot_hint' | t }}</p>
  <span class="chat-hint__tail" aria-hidden="true"></span>
</div>

<button
  type="button"
  class="chat-fab"
  [class.chat-fab--open]="isOpen"
  [attr.aria-label]="'chatbot_open' | t"
  [attr.aria-expanded]="isOpen"
  (click)="togglePanel()">
  <span class="chat-fab__halo" aria-hidden="true"></span>
  <svg *ngIf="!isOpen" class="chat-fab__icon" viewBox="0 0 32 32" aria-hidden="true">
    <defs>
      <radialGradient id="chatFabCore" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#d6f4ff" stop-opacity="0.95"/>
        <stop offset="60%" stop-color="#86d8ff" stop-opacity="0.7"/>
        <stop offset="100%" stop-color="#3a98ff" stop-opacity="0.1"/>
      </radialGradient>
    </defs>
    <circle cx="16" cy="16" r="10" fill="url(#chatFabCore)"/>
    <g stroke="#c9f2ff" stroke-width="1.1" stroke-linecap="round" opacity="0.85" fill="none">
      <line x1="16" y1="16" x2="4" y2="6"/>
      <line x1="16" y1="16" x2="28" y2="6"/>
      <line x1="16" y1="16" x2="3" y2="20"/>
      <line x1="16" y1="16" x2="29" y2="22"/>
      <line x1="16" y1="16" x2="10" y2="29"/>
      <line x1="16" y1="16" x2="22" y2="29"/>
    </g>
    <g fill="#ecf7ff">
      <circle cx="4" cy="6" r="1.4"/>
      <circle cx="28" cy="6" r="1.4"/>
      <circle cx="3" cy="20" r="1.4"/>
      <circle cx="29" cy="22" r="1.4"/>
      <circle cx="10" cy="29" r="1.4"/>
      <circle cx="22" cy="29" r="1.4"/>
    </g>
  </svg>
  <svg *ngIf="isOpen" class="chat-fab__icon" viewBox="0 0 24 24" aria-hidden="true">
    <path d="M6 6l12 12M18 6L6 18" stroke="#ecf7ff" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
</button>

<section class="chat-panel" *ngIf="isOpen" role="dialog" [attr.aria-label]="'chatbot_title' | t">
  <header class="chat-header">
    <div>
      <p class="chat-title">{{ 'chatbot_title' | t }}</p>
      <p class="chat-subtitle">{{ 'chatbot_subtitle' | t }}</p>
    </div>
    <button type="button" class="chat-close" (click)="togglePanel()" [attr.aria-label]="'chatbot_close' | t">×</button>
  </header>

  <div class="chat-log" aria-live="polite">
    <article
      *ngFor="let message of messages"
      class="chat-message"
      [class.chat-message--user]="message.role === 'user'"
      [class.chat-message--bot]="message.role === 'assistant'">
      <p>{{ message.content }}</p>
    </article>

    <article *ngIf="isSending" class="chat-message chat-message--bot chat-message--typing" aria-live="polite">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </article>

    <p *ngIf="errorKey" class="chat-error" role="alert">{{ errorKey | t }}</p>

    <div #scrollAnchor></div>
  </div>

  <form class="chat-input" (submit)="$event.preventDefault(); send()">
    <textarea
      #input
      [(ngModel)]="draft"
      name="message"
      rows="1"
      [placeholder]="'chatbot_placeholder' | t"
      [disabled]="isSending"
      (keydown)="onKeyDown($event)"></textarea>
    <button type="submit" [disabled]="isSending || !draft.trim()" [attr.aria-label]="'chatbot_send' | t">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 11l18-8-8 18-2-7-8-3z" fill="currentColor"/>
      </svg>
    </button>
  </form>
</section>

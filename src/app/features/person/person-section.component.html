<div class="person-grid">
  <div>
    <p class="eyebrow">{{ person.role }}</p>
    <h1>{{ person.name }}</h1>
    <p class="intro">{{ person.intro }}</p>

    <div class="meta">
      <span>{{ person.location }}</span>
      <span>{{ person.availability }}</span>
    </div>

    <div class="skills">
      <app-skill-chip *ngFor="let skill of person.skills" [label]="skill"></app-skill-chip>
    </div>
  </div>

  <aside class="person-side">

    <div class="quick-list">
      <h3>Hobbies</h3>
      <p [innerHTML]="person.hobbies.join(' <br> ')"></p>
      <br>
      <h3>About me</h3>
      <p [innerHTML]="person.facts.join(' <br> ')"></p>
    </div>

    <div class="github" *ngIf="githubOverview">
      <strong>{{ githubOverview.profileName }}</strong>
      <p>&#64;{{ githubOverview.username }} | {{ githubOverview.publicRepos }} public repos | {{ githubOverview.followers }} followers</p>

    </div>
  </aside>
</div>

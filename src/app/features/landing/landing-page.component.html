<div class="background-layer" aria-hidden="true">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="grid"></div>
</div>

<app-dot-nav
  class="desktop-nav"
  [items]="navItems"
  [activeId]="activeSection"
  (navigate)="scrollToSection($event)">
</app-dot-nav>

<div class="sections">
  <app-section-wrapper id="person" title="Hi, I am Sebastian" kicker="Intro">
    <app-person-section [person]="content.person" [githubOverview]="githubOverview"></app-person-section>
  </app-section-wrapper>

  <app-section-wrapper id="projects" title="Selected Work" kicker="Projects">
    <app-projects-section [projects]="content.projects" [githubOverview]="githubOverview"></app-projects-section>
  </app-section-wrapper>

  <app-section-wrapper id="experience" title="Experience" kicker="Timeline">
    <app-experience-section [items]="content.experience"></app-experience-section>
  </app-section-wrapper>

  <app-section-wrapper id="contact" title="Contact" kicker="Reach Out">
    <app-contact-section [content]="content.contact"></app-contact-section>
  </app-section-wrapper>
</div>

<app-mobile-nav
  [items]="navItems"
  [activeId]="activeSection"
  (navigate)="scrollToSection($event)">
</app-mobile-nav>

<a class="imprint-link" routerLink="/impressum">Imprint</a>

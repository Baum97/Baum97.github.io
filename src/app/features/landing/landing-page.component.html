<div class="background-layer" aria-hidden="true">
  <canvas #networkCanvas class="network-canvas"></canvas>
  <canvas #sparkCanvas class="spark-canvas"></canvas>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="grid"></div>
</div>

<button
  type="button"
  class="hamburger"
  [class.hamburger--open]="isMenuOpen"
  [attr.aria-expanded]="isMenuOpen"
  aria-controls="intro-menu"
  aria-label="Toggle intro menu"
  (click)="toggleMenu()">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</button>

<aside id="intro-menu" class="intro-drawer" [class.intro-drawer--open]="isMenuOpen" aria-label="Intro menu">


  <div class="drawer-title">Background Effects</div>
  <button type="button" class="effect-toggle" [class.effect-toggle--active]="networkEnabled" (click)="toggleEffect('network')">
    Neural Net
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
  </button>
  <button type="button" class="effect-toggle" [class.effect-toggle--active]="sparksEnabled" (click)="toggleEffect('sparks')">
    Sparks
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
  </button>
</aside>

<app-dot-nav
  class="desktop-nav"
  [items]="navItems"
  [activeId]="activeSection"
  (navigate)="scrollToSection($event)">
</app-dot-nav>

<app-mobile-nav [items]="navItems" [activeId]="activeSection" (navigate)="scrollToSection($event)"></app-mobile-nav>

<div class="sections">
  <app-section-wrapper id="person" [title]="'Hi, I am:'" kicker="Intro">
    <app-person-section [person]="content.person" [githubOverview]="githubOverview"></app-person-section>
  </app-section-wrapper>

  <app-section-wrapper id="projects" [title]="'Displayed Work'" kicker="Projects">
    <app-projects-section [projects]="content.projects" [githubOverview]="githubOverview"></app-projects-section>
  </app-section-wrapper>

  <app-section-wrapper id="experience" class="mobile-tight-to-contact">
    <app-experience-section [items]="content.experience"></app-experience-section>
  </app-section-wrapper>

  <app-section-wrapper id="contact" class="mobile-tight-from-experience" [title]="'Contact'" kicker="Reach Out">

    <app-contact-section [content]="content.contact"></app-contact-section>
  </app-section-wrapper>
</div>

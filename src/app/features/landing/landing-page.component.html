<div class="background-layer" aria-hidden="true">
  <canvas #networkCanvas class="network-canvas"></canvas>
  <canvas #sparkCanvas class="spark-canvas"></canvas>
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="grid"></div>
</div>

<app-lang-toggle></app-lang-toggle>
<app-chatbot></app-chatbot>

<button
  type="button"
  class="hamburger"
  [class.hamburger--open]="isMenuOpen"
  [attr.aria-expanded]="isMenuOpen"
  aria-controls="intro-menu"
  [attr.aria-label]="'toggle_menu' | t"
  (click)="toggleMenu()">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</button>

<aside id="intro-menu" class="intro-drawer" [class.intro-drawer--open]="isMenuOpen" [attr.aria-label]="'background_effects' | t">


  <div class="drawer-title">{{ 'background_effects' | t }}</div>
  <button type="button" class="effect-toggle" [class.effect-toggle--active]="networkEnabled" (click)="toggleEffect('network')">
    {{ 'neural_net' | t }}
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
  </button>
  <button type="button" class="effect-toggle" [class.effect-toggle--active]="sparksEnabled" (click)="toggleEffect('sparks')">
    {{ 'sparks' | t }}
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
  </button>
</aside>

<app-dot-nav
  class="desktop-nav"
  [items]="dotNavItems"
  [activeId]="activeSection"
  (navigate)="scrollToSection($event)">
</app-dot-nav>

<app-mobile-nav [items]="navItems" [activeId]="activeSection" (navigate)="scrollToSection($event)"></app-mobile-nav>

<div class="sections">
  <app-section-wrapper id="person" [title]="'hi_i_am' | t" [kicker]="'intro' | t">
    <app-person-section [person]="content.person" [githubOverview]="githubOverview"></app-person-section>
  </app-section-wrapper>

  <app-section-wrapper id="projects" [title]="'displayed_work' | t" [kicker]="'projects_kicker' | t">
    <app-projects-section [projects]="content.projects" [githubOverview]="githubOverview"></app-projects-section>
  </app-section-wrapper>

  <app-section-wrapper id="experience" class="mobile-tight-to-contact">
    <app-experience-section [items]="content.experience"></app-experience-section>
  </app-section-wrapper>

  <app-section-wrapper id="contact" class="mobile-tight-from-experience" [title]="'contact_title' | t" [kicker]="'reach_out' | t">

    <app-contact-section [content]="content.contact"></app-contact-section>
  </app-section-wrapper>
</div>

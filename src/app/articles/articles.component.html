<!-- articles.component.html -->
<html>
<header>
  <div class="container">
    <div class="header" (click)="toggleCollapse()">
      <h2>Articles</h2>
      <i class="fa" [ngClass]="{'fa-chevron-up': collapsed, 'fa-chevron-down': !collapsed}"></i>
    </div>
    <!--delete to display elements for articles-->
    <div class="filters">
      <form class="example-form">
        <mat-form-field class="name-form-field">
          <mat-label>Favorite food</mat-label>
          <input matInput type="text">
        </mat-form-field>

        <mat-form-field class="example-form-field">
          <mat-label>Clearable input</mat-label>
          <input matInput type="text" [(ngModel)]="value">
          <div *ngIf="value.length > 0">
            <button matSuffix mat-icon-button aria-label="Clear" (click)="value=''">
              <mat-icon>close</mat-icon>
            </button>
          </div>
        </mat-form-field>
      </form>
    </div>
    <!--delete to display elements for articles-->

    <div class="articles">
      <div class="article" *ngFor="let article of filteredArticles">
        <h3>{{ article.title }}</h3>
        <p>{{ article.content }}</p>
      </div>
      <div *ngIf="filteredArticles.length === 0">No articles found.</div>
    </div>
  </div>
</header>

<body>
<div class="card-container">
<div *ngFor="let article of articles">
  <div class="surrounding">
  <a [routerLink]="['/article', article.articleNo]" (click)="articlesService.setArticleNo(article.articleNo)">
  <div class="mat-card">
    <div class="card-content">
      <h3>{{article.name}}</h3>
      <p>{{article.description}} </p>
      <div *ngIf="article.img != null">
        {{article.img}}
      </div>
      <br><br><br>
      <p class="footer">By: <a>{{article.company}}</a></p>
      <p class="footer">{{article.price}}€</p>
    </div>
  </div>
  </a>
  </div>
</div>
</div>

</body>
</html>

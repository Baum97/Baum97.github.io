<style>
  :host {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
    font-size: 14px;
    color: #333;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
</style>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet/less" type="text/css" href="styles.less" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/less.js/3.12.2/less.min.js"></script>
  <title>Angular Header</title>
</head>

<body>
<header>
  <div class="logo">Markt♥Helfer</div>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li class="dropdown">
        <a href="#">Create</a>
          <ul class="dropdown-menu">
            <li><a href="http://localhost:4200/articles/create">Article</a></li>
          </ul>
      </li>
      <li class="dropdown">
        <a href="#">Info</a>
        <ul class="dropdown-menu">
          <li><a href="http://localhost:4200/impressum">Impressum</a></li>
        </ul>
      </li>
    </ul>
  </nav>
</header>

<div class="card-container">

    <div *ngFor="let article of articles">
      <div class="mat-card">
        <div class="card-content">
          <h3>{{article.name}}</h3>
          <p>{{article.description}} </p>
          <br><br><br>
          <p class="footer">By:<a> {{article.company}}</a></p>
          <p class="footer">{{article.price}}€</p>
        </div>
      </div>
    </div>

</div>


</body>
</html>
<router-outlet></router-outlet>
